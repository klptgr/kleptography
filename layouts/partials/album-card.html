{{ $gallery := partial "get-gallery.html" . }}
{{ with $gallery }}
  <a class="card post-card" href="{{ .page.RelPermalink }}" title="{{ .page.Title }}">
    <figure style="background-color: {{ .color }}">
      <img class="lazyload"
        width="{{ .thumbnail.Width }}"
        height="{{ .thumbnail.Height }}"
        data-src="{{ .thumbnail.RelPermalink }}"
        alt="{{ .page.Title }}" />

      <div class="album-card-content">
        <h2>{{ .page.Title }}</h2>
      </div>
    </figure>
  </a>
{{ end }}
