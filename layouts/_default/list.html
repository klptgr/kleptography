{{ define "main" }}
<div class="list-page{{ if eq .Section "portfolio" }} portfolio-page{{ end }}">
    {{ partial "page-header.html" . }}
    
    <section class="page-content">
        {{ .Content }}
    </section>

    <section class="galleries">
        {{ range where .Pages "Params.private" "ne" true }}
            {{ partial "album-card.html" . }}
        {{ end }}
    </section>
</div>
{{ end }}
